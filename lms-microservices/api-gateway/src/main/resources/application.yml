# api-gateway — Configuration minimale locale
# Config centralisée dans config-repo/api-gateway.yml

spring:
  application:
    name: api-gateway
  config:
    import: "optional:configserver:http://localhost:8888"

# --- Fallback local ---
server:
  port: 8080

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
