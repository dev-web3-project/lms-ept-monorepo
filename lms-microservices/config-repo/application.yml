# ============================================================
# CONFIG COMMUNE — héritée par TOUS les microservices LMS
# Toutes les valeurs sensibles sont dans .env
# ⚠️  La datasource est définie dans chaque service (DB séparée)
# ============================================================

# --- Eureka Client ---
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true

# --- JPA commun (dialect, ddl-auto) ---
spring:
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  data:
    rest:
      detection-strategy: annotated

# --- SpringDoc (Swagger) ---
springdoc:
  swagger-ui:
    disable-swagger-default-url: true
  default-consumes-media-type: application/json

# --- Uploads Configuration ---
app:
  upload:
    dir: ${UPLOAD_DIR:./uploads}
