# ============================================================
# CONFIG — announcement-service (Notifications, Annonces)
# ============================================================

server:
  port: 8086

spring:
  datasource:
    url: ${ANNOUNCEMENT_DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  security:
    user:
      name: admin
      password: ${ANNOUNCEMENT_ADMIN_PASSWORD:admin}
    basic:
      enabled: false
